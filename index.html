<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>&#20945;&#21313;&#28040;&#38500;&#26827;&#30424;</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f3ea;
      --ink: #24211c;
      --muted: #746d61;
      --line: #d8d0c1;
      --panel: #fffdf7;
      --accent: #1f7a6d;
      --accent-2: #cc5a37;
      --good: #1f8a4c;
      --danger: #b83d2d;
      --cell: clamp(19px, min(calc((100vw - 372px) / 10), calc((100vh - 128px) / 16)), 38px);
      --gap: 4px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      height: 100vh;
      overflow: hidden;
      font-family: "Microsoft YaHei", "PingFang SC", system-ui, sans-serif;
      color: var(--ink);
      background:
        linear-gradient(135deg, rgba(31, 122, 109, .08), transparent 32%),
        linear-gradient(315deg, rgba(204, 90, 55, .10), transparent 34%),
        var(--bg);
    }

    .app {
      width: min(1180px, calc(100vw - 24px));
      margin: 0 auto;
      height: 100vh;
      padding: 12px 0;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 320px;
      grid-template-rows: auto minmax(0, 1fr);
      gap: 12px;
      align-items: stretch;
    }

    header {
      grid-column: 1 / -1;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid var(--line);
      padding-bottom: 12px;
    }

    h1 {
      margin: 0;
      font-size: clamp(22px, 3.2vw, 34px);
      line-height: 1.05;
      letter-spacing: 0;
    }

    .sub {
      margin: 5px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(76px, 1fr));
      gap: 8px;
      min-width: min(520px, 100%);
    }

    .stat, .side {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 14px 35px rgba(57, 44, 25, .08);
    }

    .stat {
      padding: 8px 10px;
      min-height: 58px;
    }

    .label {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 5px;
    }

    .value {
      font-size: 24px;
      font-weight: 800;
      line-height: 1;
    }

    .time-low .value {
      color: var(--danger);
    }

    .board-wrap {
      position: relative;
      width: fit-content;
      max-width: 100%;
      align-self: center;
      justify-self: center;
      touch-action: none;
      user-select: none;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(10, var(--cell));
      grid-template-rows: repeat(16, var(--cell));
      gap: var(--gap);
      padding: 8px;
      background: rgba(255, 253, 247, .82);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 18px 45px rgba(57, 44, 25, .12);
    }

    .board.locked {
      pointer-events: none;
      filter: grayscale(.25);
    }

    .cell {
      display: grid;
      place-items: center;
      width: var(--cell);
      height: var(--cell);
      border: 1px solid #cfc5b3;
      border-radius: 6px;
      background: #fffaf0;
      color: #2d2922;
      font-size: clamp(15px, 3vw, 22px);
      font-weight: 800;
      line-height: 1;
      transition: transform .12s ease, background .12s ease, opacity .18s ease;
    }

    .cell.selected {
      background: #d7efe7;
      border-color: var(--accent);
      transform: scale(.95);
    }

    .cell.cleared {
      opacity: .18;
      background: #ece6da;
      color: transparent;
      transform: scale(.86);
    }

    .selection-box {
      position: absolute;
      border: 2px solid var(--accent-2);
      background: rgba(204, 90, 55, .12);
      border-radius: 6px;
      pointer-events: none;
      display: none;
    }

    .side {
      padding: 12px;
      display: grid;
      grid-template-rows: auto auto auto auto minmax(0, 1fr);
      gap: 10px;
      min-height: 0;
    }

    .player-panel {
      display: grid;
      gap: 8px;
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .actions.single {
      grid-template-columns: 1fr;
    }

    button, input {
      font: inherit;
      border-radius: 7px;
    }

    button {
      min-height: 42px;
      border: 0;
      background: var(--accent);
      color: white;
      font-weight: 800;
      cursor: pointer;
    }

    button.secondary {
      background: #e9e1d3;
      color: var(--ink);
      border: 1px solid var(--line);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: .55;
    }

    input {
      width: 100%;
      min-height: 42px;
      border: 1px solid var(--line);
      background: #fffaf0;
      padding: 0 10px;
    }

    input.invalid {
      border-color: var(--danger);
      box-shadow: 0 0 0 2px rgba(184, 61, 45, .15);
    }

    .message {
      min-height: 42px;
      padding: 10px;
      border-radius: 7px;
      color: var(--muted);
      background: #f3eee4;
      font-size: 14px;
    }

    .message.good {
      color: var(--good);
      background: #e9f5ee;
    }

    h2 {
      margin: 0;
      font-size: 18px;
      letter-spacing: 0;
    }

    .leaderboard-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
    }

    .link-button {
      min-height: 32px;
      padding: 0 10px;
      border: 1px solid var(--line);
      background: #f7efe1;
      color: var(--ink);
      font-size: 13px;
    }

    ol {
      margin: 0;
      padding-left: 28px;
      display: grid;
      gap: 8px;
      overflow: auto;
      min-height: 0;
    }

    li {
      padding: 8px 0;
      border-bottom: 1px solid var(--line);
      color: var(--muted);
    }

    li strong {
      color: var(--ink);
    }

    li span {
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    @media (max-width: 860px) {
      :root {
        --cell: clamp(13px, min(calc((100vw - 50px) / 10), calc((100dvh - 258px) / 16)), 31px);
        --gap: 2px;
      }

      body {
        height: 100dvh;
        min-height: 100dvh;
        overflow: hidden;
      }
      .app {
        width: min(100vw - 8px, 1180px);
        height: 100dvh;
        min-height: 0;
        grid-template-columns: 1fr;
        grid-template-rows: auto auto minmax(0, 1fr);
        padding: 4px 0;
        gap: 4px;
      }

      .side {
        grid-row: 1;
        grid-template-rows: auto auto auto auto;
        gap: 3px;
        padding: 5px;
      }

      header {
        grid-row: 2;
        padding-bottom: 4px;
        border-bottom: 0;
      }

      .board-wrap {
        grid-row: 3;
      }

      header {
        align-items: stretch;
        flex-direction: column;
      }
      header > div {
        display: none;
      }
      .stats {
        min-width: 0;
        grid-template-columns: repeat(4, 1fr);
        gap: 3px;
      }
      .stat {
        min-height: 34px;
        padding: 3px 5px;
      }
      .label {
        font-size: 9px;
        margin-bottom: 2px;
      }
      .value {
        font-size: 16px;
      }
      .board-wrap { margin: 0 auto; }

      .side > div:first-child {
        display: none;
      }

      .player-panel {
        order: 1;
        grid-template-columns: minmax(0, 1fr) 112px;
        align-items: center;
      }

      .message {
        order: 3;
        min-height: 24px;
        padding: 4px 6px;
        font-size: 11px;
      }

      .leaderboard-head {
        order: 2;
        display: flex;
        min-height: 22px;
      }

      ol {
        order: 2;
        display: grid;
        max-height: 62px;
        padding-left: 24px;
        gap: 2px;
        font-size: 11px;
        overflow: auto;
      }

      li {
        padding: 3px 0;
      }

      button,
      input {
        min-height: 32px;
      }

      .board {
        padding: 4px;
      }

      .cell {
        border-radius: 4px;
        font-size: clamp(12px, 4vw, 17px);
      }
    }

    @media (max-width: 520px) {
      :root {
        --cell: clamp(13px, min(calc((100vw - 44px) / 10), calc((100dvh - 226px) / 16)), 30px);
      }
    }

    .modal {
      position: fixed;
      inset: 0;
      display: none;
      place-items: center;
      padding: 18px;
      background: rgba(36, 33, 28, .42);
      z-index: 20;
    }

    .modal.open {
      display: grid;
    }

    .dialog {
      width: min(420px, 100%);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 24px 70px rgba(36, 33, 28, .25);
      padding: 18px;
      display: grid;
      gap: 12px;
    }

    .dialog h3 {
      margin: 0;
      font-size: 24px;
      letter-spacing: 0;
    }

    .dialog-score {
      font-size: 40px;
      line-height: 1;
      font-weight: 900;
      color: var(--accent);
    }

    .dialog p {
      margin: 0;
      color: var(--muted);
    }

    .dialog-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }
  </style>
</head>
<body>
  <main class="app">
    <header>
      <div>
        <h1>&#20945;&#21313;&#28040;&#38500;&#26827;&#30424;</h1>
        <p class="sub">&#25302;&#25341;&#26694;&#36873;&#25968;&#23383;&#65292;&#24635;&#21644;&#27491;&#22909;&#20026; 10 &#23601;&#28040;&#38500;&#65307;&#27599;&#28040;&#25481; 1 &#26684;&#24471; 1 &#20998;&#12290;</p>
      </div>
      <section class="stats" aria-label="&#28216;&#25103;&#25968;&#25454;">
        <div class="stat"><span class="label">&#24403;&#21069;&#31215;&#20998;</span><span class="value" id="score">0</span></div>
        <div class="stat" id="timerStat"><span class="label">&#21097;&#20313;&#26102;&#38388;</span><span class="value" id="timer">120</span></div>
        <div class="stat"><span class="label">&#21097;&#20313;&#26684;&#23376;</span><span class="value" id="left">160</span></div>
        <div class="stat"><span class="label">&#26694;&#36873;&#24635;&#21644;</span><span class="value" id="sum">0</span></div>
      </section>
    </header>

    <section class="board-wrap" id="boardWrap" aria-label="&#25968;&#23383;&#26827;&#30424;">
      <div class="board" id="board"></div>
      <div class="selection-box" id="selectionBox"></div>
    </section>

    <aside class="side">
      <div>
        <h2>&#31215;&#20998;&#25490;&#34892;&#27036;</h2>
        <p class="sub">&#25490;&#34892;&#27036;&#20174; Supabase &#20113;&#31471;&#25968;&#25454;&#24211;&#35835;&#21462;&#12290;</p>
      </div>
      <div class="player-panel">
        <input id="playerName" maxlength="7" required placeholder="&#36755;&#20837;&#21517;&#23383;">
        <button id="startGame">&#24320;&#22987;&#28216;&#25103;</button>
      </div>
      <div class="message" id="message">&#36755;&#20837;&#21517;&#23383;&#24320;&#22987;&#28216;&#25103;&#65292;&#38656;&#35201;&#26694;&#36873;&#25968;&#23383;&#65292;&#35753;&#20182;&#20204;&#30340;&#24635;&#21644;&#31561;&#20110;10&#12290;</div>
      <div class="leaderboard-head">
        <span class="label">&#21069;&#19977;&#21517;</span>
        <button id="toggleLeaderboard" class="link-button">&#26597;&#30475;&#20840;&#37096;</button>
      </div>
      <ol id="leaderboard"></ol>
    </aside>
  </main>

  <div class="modal" id="endModal" role="dialog" aria-modal="true" aria-labelledby="endTitle">
    <div class="dialog">
      <h3 id="endTitle">&#28216;&#25103;&#32467;&#26463;</h3>
      <div class="dialog-score"><span id="finalScore">0</span> &#20998;</div>
      <p id="endMessage"></p>
      <div class="dialog-actions">
        <button id="uploadScore">&#19978;&#20256;&#25104;&#32489;</button>
        <button id="skipUpload" class="secondary">&#19981;&#19978;&#20256;</button>
      </div>
    </div>
  </div>

  <script>
    const rows = 16;
    const cols = 10;
    const gameSeconds = 120;
    const board = document.querySelector("#board");
    const boardWrap = document.querySelector("#boardWrap");
    const box = document.querySelector("#selectionBox");
    const scoreEl = document.querySelector("#score");
    const timerEl = document.querySelector("#timer");
    const timerStat = document.querySelector("#timerStat");
    const leftEl = document.querySelector("#left");
    const sumEl = document.querySelector("#sum");
    const msg = document.querySelector("#message");
    const leaderboardEl = document.querySelector("#leaderboard");
    const nameInput = document.querySelector("#playerName");
    const startBtn = document.querySelector("#startGame");
    const toggleLeaderboardBtn = document.querySelector("#toggleLeaderboard");
    const endModal = document.querySelector("#endModal");
    const finalScoreEl = document.querySelector("#finalScore");
    const endMessageEl = document.querySelector("#endMessage");
    const uploadScoreBtn = document.querySelector("#uploadScore");
    const skipUploadBtn = document.querySelector("#skipUpload");
    const supabaseUrl = "https://qxvfdkzavtqicjfvqagg.supabase.co";
    const supabaseAnonKey = "sb_publishable_U70FjzelkfpsnXscvmVyJA_zKQJKwIO";
    const scoresTable = "scores";

    let cells = [];
    let score = 0;
    let timeLeft = gameSeconds;
    let timerId = null;
    let gameOver = false;
    let gameStarted = false;
    let playerName = "";
    let leaderboard = [];
    let showAllLeaderboard = false;
    let scoreSavedForRound = false;
    let clearsThisRound = 0;
    let dragging = false;
    let start = null;
    let selected = [];

    const text = {
      ready: "\u6846\u9009\u6570\u5b57\uff0c\u51d1\u591f10\u5c31\u6d88\u9664\u3002",
      waiting: "\u8f93\u5165\u540d\u5b57\u5f00\u59cb\u6e38\u620f\uff0c\u9700\u8981\u6846\u9009\u6570\u5b57\uff0c\u8ba9\u4ed6\u4eec\u7684\u603b\u548c\u7b49\u4e8e10\u3002",
      needName: "\u540d\u5b57\u4e0d\u80fd\u4e3a\u7a7a\u3002",
      over: "\u65f6\u95f4\u5230\uff01\u53ef\u4ee5\u9009\u62e9\u662f\u5426\u4e0a\u4f20\u6210\u7ee9\u3002",
      saved: "\u6210\u7ee9\u5df2\u4fdd\u5b58\uff0c\u6392\u884c\u699c\u5df2\u66f4\u65b0\u3002",
      skipped: "\u672c\u6b21\u6210\u7ee9\u672a\u4e0a\u4f20\u3002",
      boardClear: "\u5168\u6e05\uff01\u68cb\u76d8\u5df2\u5237\u65b0\uff0c\u65f6\u95f4\u7ee7\u7eed\u3002",
      perfect: (seconds) => `\u518d\u6b21\u5168\u6e05\uff01\u5269\u4f59 ${seconds} \u79d2\uff0c+${seconds} \u5206\u3002`,
      player: "\u73a9\u5bb6",
      noScores: "\u8fd8\u6ca1\u6709\u516c\u5f00\u6210\u7ee9",
      loading: "\u6b63\u5728\u8bfb\u53d6\u4e91\u7aef\u6392\u884c\u699c...",
      loadFail: "\u6392\u884c\u699c\u6682\u65f6\u8bfb\u53d6\u5931\u8d25\uff0c\u7a0d\u540e\u518d\u8bd5\u3002",
      configMissing: "\u8bf7\u5148\u586b\u5165 Supabase Project URL \u548c anon key\u3002",
      saveFail: "\u6210\u7ee9\u4fdd\u5b58\u5931\u8d25\uff0c\u8bf7\u68c0\u67e5 Supabase \u914d\u7f6e\u3002",
      notFirst: (name) => `\u4f60\u4e0d\u5982${name}\u7684\u4e00\u6839\uff0c\u4f60\u4e5f\u592a\u5f31\u4e86\u5427\u3002`,
      first: "\u51c6\u5907\u597d\u63a5\u53d7\u819c\u62dc\u4e86\u4e48\uff1f"
    };

    function randDigit() {
      return Math.floor(Math.random() * 9) + 1;
    }

    function makeTenGroup(size) {
      const values = Array.from({ length: size }, () => 1);
      let remaining = 10 - size;
      while (remaining > 0) {
        const index = Math.floor(Math.random() * size);
        if (values[index] >= 9) continue;
        values[index] += 1;
        remaining -= 1;
      }
      return shuffle(values);
    }

    function shuffle(list) {
      const copy = [...list];
      for (let i = copy.length - 1; i > 0; i -= 1) {
        const j = Math.floor(Math.random() * (i + 1));
        [copy[i], copy[j]] = [copy[j], copy[i]];
      }
      return copy;
    }

    function generateBoardValues() {
      const values = [];
      while (values.length < rows * cols) {
        const left = rows * cols - values.length;
        const candidates = [2, 3, 4].filter((size) => size <= left && left - size !== 1);
        const groupSize = left <= 4 && left !== 1
          ? left
          : candidates[Math.floor(Math.random() * candidates.length)];
        values.push(...makeTenGroup(groupSize));
      }
      return values;
    }

    function buildCells() {
      const values = generateBoardValues();
      cells = Array.from({ length: rows * cols }, (_, index) => ({
        index,
        row: Math.floor(index / cols),
        col: index % cols,
        value: values[index] || randDigit(),
        cleared: false
      }));
    }

    function startGame() {
      clearInterval(timerId);
      score = 0;
      timeLeft = gameSeconds;
      gameOver = false;
      gameStarted = true;
      scoreSavedForRound = false;
      clearsThisRound = 0;
      selected = [];
      start = null;
      endModal.classList.remove("open");
      nameInput.disabled = true;
      startBtn.textContent = "\u91cd\u65b0\u5f00\u59cb";
      board.classList.remove("locked");
      timerStat.classList.remove("time-low");
      buildCells();
      renderBoard();
      updateStats(0);
      setMessage(text.ready);
      timerId = setInterval(tickTimer, 1000);
    }

    function tickTimer() {
      timeLeft -= 1;
      updateStats(Number(sumEl.textContent) || 0);
      timerStat.classList.toggle("time-low", timeLeft <= 10);
      if (timeLeft <= 0) endGame();
    }

    async function endGame() {
      if (gameOver) return;
      clearInterval(timerId);
      timeLeft = 0;
      gameOver = true;
      gameStarted = false;
      dragging = false;
      box.style.display = "none";
      document.querySelectorAll(".cell.selected").forEach((el) => el.classList.remove("selected"));
      board.classList.add("locked");
      updateStats(0);
      setMessage(text.over);
      await finishAndShowResult();
    }

    async function completeGame() {
      if (gameOver) return;
      clearsThisRound += 1;
      if (clearsThisRound === 1) {
        selected = [];
        start = null;
        buildCells();
        renderBoard();
        updateStats(0);
        setMessage(text.boardClear, true);
        return;
      }

      clearInterval(timerId);
      const bonus = Math.max(0, timeLeft);
      score += bonus;
      gameOver = true;
      gameStarted = false;
      dragging = false;
      box.style.display = "none";
      document.querySelectorAll(".cell.selected").forEach((el) => el.classList.remove("selected"));
      board.classList.add("locked");
      updateStats(0);
      setMessage(text.perfect(bonus), true);
      await finishAndShowResult();
    }

    function renderBoard() {
      board.innerHTML = "";
      cells.forEach((cell) => {
        const tile = document.createElement("div");
        tile.className = "cell";
        tile.dataset.index = cell.index;
        tile.textContent = cell.value;
        board.appendChild(tile);
      });
    }

    function updateStats(sum) {
      scoreEl.textContent = score;
      timerEl.textContent = Math.max(0, timeLeft);
      leftEl.textContent = cells.filter((cell) => !cell.cleared).length;
      sumEl.textContent = sum;
    }

    function setMessage(message, good = false) {
      msg.textContent = message;
      msg.classList.toggle("good", good);
    }

    function pointToCell(event) {
      const el = document.elementFromPoint(event.clientX, event.clientY);
      const cellEl = el && el.closest(".cell");
      if (!cellEl || !board.contains(cellEl)) return null;
      return cells[Number(cellEl.dataset.index)];
    }

    function drawSelection(event) {
      const wrapRect = boardWrap.getBoundingClientRect();
      const x1 = Math.min(start.x, event.clientX) - wrapRect.left;
      const y1 = Math.min(start.y, event.clientY) - wrapRect.top;
      const x2 = Math.max(start.x, event.clientX) - wrapRect.left;
      const y2 = Math.max(start.y, event.clientY) - wrapRect.top;
      box.style.display = "block";
      box.style.left = `${x1}px`;
      box.style.top = `${y1}px`;
      box.style.width = `${Math.max(4, x2 - x1)}px`;
      box.style.height = `${Math.max(4, y2 - y1)}px`;
    }

    function selectRectangle(endCell) {
      if (!start || !endCell) return;
      const minRow = Math.min(start.cell.row, endCell.row);
      const maxRow = Math.max(start.cell.row, endCell.row);
      const minCol = Math.min(start.cell.col, endCell.col);
      const maxCol = Math.max(start.cell.col, endCell.col);

      selected = cells.filter((cell) =>
        !cell.cleared &&
        cell.row >= minRow &&
        cell.row <= maxRow &&
        cell.col >= minCol &&
        cell.col <= maxCol
      );

      document.querySelectorAll(".cell.selected").forEach((el) => el.classList.remove("selected"));
      selected.forEach((cell) => board.children[cell.index].classList.add("selected"));
      updateStats(selected.reduce((total, cell) => total + cell.value, 0));
    }

    async function finishSelection() {
      if (!dragging) return;
      dragging = false;
      box.style.display = "none";
      const sum = selected.reduce((total, cell) => total + cell.value, 0);

      if (selected.length && sum === 10) {
        selected.forEach((cell) => {
          cell.cleared = true;
          const el = board.children[cell.index];
          el.classList.remove("selected");
          el.classList.add("cleared");
          el.textContent = "";
        });
        const clearedCount = selected.length;
        const scoreGain = clearedCount + Math.max(0, clearedCount - 2);
        const timeGain = Math.floor(clearedCount / 2);
        score += scoreGain;
        timeLeft += timeGain;
        if (cells.every((cell) => cell.cleared)) {
          selected = [];
          start = null;
          await completeGame();
          return;
        }
        setMessage(`\u6d88\u9664 ${clearedCount} \u683c\uff0c+${scoreGain} \u5206\uff0c+${timeGain} \u79d2\u3002`, true);
      } else if (selected.length) {
        document.querySelectorAll(".cell.selected").forEach((el) => el.classList.remove("selected"));
        setMessage(`\u8fd9\u6b21\u603b\u548c\u662f ${sum}\uff0c\u8fd8\u5dee\u4e00\u70b9\u70b9\u3002`);
      }

      selected = [];
      start = null;
      updateStats(0);
    }

    function hasSupabaseConfig() {
      return supabaseUrl.startsWith("https://") && !supabaseAnonKey.startsWith("PASTE_");
    }

    async function supabaseRequest(path, options = {}) {
      if (!hasSupabaseConfig()) throw new Error("Missing Supabase config");
      const response = await fetch(`${supabaseUrl}/rest/v1/${path}`, {
        ...options,
        headers: {
          "apikey": supabaseAnonKey,
          "Authorization": `Bearer ${supabaseAnonKey}`,
          "Content-Type": "application/json",
          "Prefer": "return=representation",
          ...(options.headers || {})
        }
      });
      if (!response.ok) throw new Error("Supabase request failed");
      return response.json();
    }

    async function loadLeaderboard(limit = 100) {
      const path = `${scoresTable}?select=name,score,created_at&order=score.desc,created_at.asc&limit=${limit}`;
      const rows = await supabaseRequest(path);
      return rows.map((row) => ({
        name: row.name,
        score: Number(row.score),
        at: Date.parse(row.created_at) || 0
      }));
    }

    async function saveScore(name, score) {
      await supabaseRequest(scoresTable, {
        method: "POST",
        body: JSON.stringify({ name, score })
      });
    }

    async function renderLeaderboard() {
      if (!hasSupabaseConfig()) {
        leaderboardEl.innerHTML = `<li>${text.configMissing}</li>`;
        return;
      }
      leaderboardEl.innerHTML = `<li>${text.loading}</li>`;
      try {
        leaderboard = await loadLeaderboard();
        const visibleList = showAllLeaderboard ? leaderboard : leaderboard.slice(0, 3);
        toggleLeaderboardBtn.textContent = showAllLeaderboard ? "\u6536\u8d77" : "\u67e5\u770b\u5168\u90e8";
        leaderboardEl.innerHTML = visibleList.length
          ? visibleList.map((item) => `<li><strong>${escapeHtml(item.name)}</strong> ${item.score} \u5206 <span>${rankHours(item.at)} \u5c0f\u65f6</span></li>`).join("")
          : `<li>${text.noScores}</li>`;
      } catch {
        leaderboardEl.innerHTML = `<li>${text.loadFail}</li>`;
      }
    }

    function rankHours(timestamp) {
      return Math.max(0, Math.floor((Date.now() - timestamp) / 3600000));
    }

    async function finishAndShowResult() {
      const previousBest = leaderboard[0] || null;
      finalScoreEl.textContent = score;
      const isFirst = !previousBest || score > previousBest.score;
      endMessageEl.textContent = isFirst ? text.first : text.notFirst(previousBest.name);
      uploadScoreBtn.disabled = false;
      endModal.classList.add("open");
      nameInput.disabled = false;
    }

    function escapeHtml(value) {
      const span = document.createElement("span");
      span.textContent = value;
      return span.innerHTML;
    }

    board.addEventListener("pointerdown", (event) => {
      if (gameOver || !gameStarted) return;
      const cell = pointToCell(event);
      if (!cell || cell.cleared) return;
      dragging = true;
      start = { x: event.clientX, y: event.clientY, cell };
      board.setPointerCapture(event.pointerId);
      selectRectangle(cell);
    });

    board.addEventListener("pointermove", (event) => {
      if (!dragging || gameOver) return;
      drawSelection(event);
      selectRectangle(pointToCell(event));
    });

    board.addEventListener("pointerup", finishSelection);
    board.addEventListener("pointercancel", finishSelection);

    startBtn.addEventListener("click", () => {
      const name = nameInput.value.trim().slice(0, 7);
      if (!name) {
        setMessage(text.needName);
        nameInput.classList.add("invalid");
        nameInput.focus();
        return;
      }
      nameInput.value = name;
      nameInput.classList.remove("invalid");
      playerName = name;
      startGame();
    });
    nameInput.addEventListener("input", () => {
      if (nameInput.value.length > 7) nameInput.value = nameInput.value.slice(0, 7);
      if (nameInput.value.trim()) nameInput.classList.remove("invalid");
    });
    uploadScoreBtn.addEventListener("click", async () => {
      if (scoreSavedForRound) return;
      uploadScoreBtn.disabled = true;
      try {
        await saveScore(playerName, score);
        scoreSavedForRound = true;
        await renderLeaderboard();
        endModal.classList.remove("open");
        nameInput.disabled = false;
        setMessage(text.saved, true);
      } catch {
        uploadScoreBtn.disabled = false;
        setMessage(hasSupabaseConfig() ? text.saveFail : text.configMissing);
      }
    });

    skipUploadBtn.addEventListener("click", () => {
      endModal.classList.remove("open");
      nameInput.disabled = false;
      setMessage(text.skipped);
    });
    toggleLeaderboardBtn.addEventListener("click", () => {
      showAllLeaderboard = !showAllLeaderboard;
      renderLeaderboard();
    });

    board.classList.add("locked");
    buildCells();
    renderBoard();
    updateStats(0);
    setMessage(text.waiting);
    renderLeaderboard();
  </script>
</body>
</html>
